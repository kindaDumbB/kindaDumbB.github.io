<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fixed Mic Pipeline</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column">

<button id="start">Start Mic</button>
<div id="status">Idle</div>

<script>
let ctx;

document.getElementById("start").onclick = async () => {
  const status = document.getElementById("status");

  try {
    status.textContent = "Creating audio context...";

    ctx = new AudioContext({ sampleRate: 48000 });

    await ctx.resume(); // 🔥 CRITICAL FIX

    status.textContent = "Requesting mic...";

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    const source = ctx.createMediaStreamSource(stream);

    // Simple guaranteed working output first (NO RNNOISE YET)
    const gain = ctx.createGain();
    gain.gain.value = 1.0;

    source.connect(gain);
    gain.connect(ctx.destination);

    status.textContent = "MIC ACTIVE (loopback working)";

    console.log("Audio pipeline running");

  } catch (err) {
    console.error(err);
    status.textContent = "ERROR: " + err.message;
  }
};
</script>

</body>
</html>
