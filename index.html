<canvas id="sound"></canvas>
<button id="toggle">Toggle Mic</button>

<script type="module">
import rnnoise from './rnnoise.js';

const $ = document.querySelector.bind(document);

function getAudioStream() {
  return navigator.mediaDevices.getUserMedia({ audio: true });
}

function setupCanvas(elem) {
  const ctx = elem.getContext("2d");
  elem.width = 400;
  elem.height = 200;
  elem.style.border = "4px solid black";
  return ctx;
}

const canvas = $("#sound");
const ctx = setupCanvas(canvas);

let audioCtx;
let processor;
let source;
let analyser;
let gainNode;

let running = false;

async function start() {
  audioCtx = new AudioContext();

  const stream = await getAudioStream();

  analyser = audioCtx.createAnalyser();
  source = audioCtx.createMediaStreamSource(stream);

  processor = audioCtx.createScriptProcessor(1024, 1, 1);
  gainNode = audioCtx.createGain();

  const {
    _rnnoise_create,
    _rnnoise_process_frame,
    _rnnoise_destroy,
    _malloc,
    _free,
    HEAPF32
  } = await rnnoise();

  const FRAME = 480;

  const inPtr = _malloc(FRAME * 4);
  const outPtr = _malloc(FRAME * 4);

  const inIndex = inPtr / 4;
  const outIndex = outPtr / 4;

  const rn = _rnnoise_create();

  let buffer = new Float32Array(0);

  function process(frame) {
    HEAPF32.set(frame, inIndex);
    _rnnoise_process_frame(rn, outPtr, inPtr);
    return new Float32Array(HEAPF32.slice(outIndex, outIndex + FRAME));
  }

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    const output = e.outputBuffer.getChannelData(0);

    if (!running) {
      output.fill(0);
      return;
    }

    const merged = new Float32Array(buffer.length + input.length);
    merged.set(buffer);
    merged.set(input, buffer.length);
    buffer = merged;

    let i = 0;

    while (buffer.length >= FRAME && i + FRAME <= output.length) {
      const frame = buffer.slice(0, FRAME);
      buffer = buffer.slice(FRAME);

      const cleaned = process(frame);
      output.set(cleaned, i);

      i += FRAME;
    }

    // fill rest silence
    for (; i < output.length; i++) {
      output[i] = 0;
    }
  };

  // 🔥 REAL AUDIO ROUTE
  source.connect(analyser);
  analyser.connect(processor);

  // IMPORTANT: use gain as final gate
  processor.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  gainNode.gain.value = 1;

  draw();
}

function stop() {
  running = false;

  if (gainNode) gainNode.gain.value = 0;

  if (audioCtx) {
    audioCtx.close();
  }
}

function draw() {
  if (!analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, 400, 200);

  ctx.beginPath();
  ctx.strokeStyle = "#000";

  const step = 400 / data.length;
  ctx.moveTo(0, 200);

  for (let i = 0; i < data.length; i++) {
    const y = 200 - (data[i] / 255) * 180;
    ctx.lineTo(i * step, y);
  }

  ctx.stroke();

  requestAnimationFrame(draw);
}

$("#toggle").onclick = async () => {
  running = !running;

  if (running) {
    await start();
  } else {
    stop();
  }
};
</script>
