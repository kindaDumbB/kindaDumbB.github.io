<canvas id="sound"></canvas>

<script type="module">
import rnnoise from './rnnoise.js';

const $ = document.querySelector.bind(document);

function getAudioStream() {
  return navigator.mediaDevices.getUserMedia({ audio: true });
}

async function analyse(stream) {
  const ctx = new AudioContext();

  const analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(stream);
  const processor = ctx.createScriptProcessor(1024, 1, 1);

  const {
    _rnnoise_create,
    _rnnoise_process_frame,
    _rnnoise_destroy,
    _malloc,
    _free,
    HEAPF32
  } = await rnnoise();

  const FRAME = 480;

  const inPtr = _malloc(FRAME * 4);
  const outPtr = _malloc(FRAME * 4);

  const inIndex = inPtr / 4;
  const outIndex = outPtr / 4;

  const rn = _rnnoise_create();

  // 🔥 CRITICAL: strict frame buffer (NO streaming mix)
  let buffer = new Float32Array(0);

  function process(frame) {
    HEAPF32.set(frame, inIndex);
    _rnnoise_process_frame(rn, outPtr, inPtr);
    return new Float32Array(HEAPF32.slice(outIndex, outIndex + FRAME));
  }

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    const output = e.outputBuffer.getChannelData(0);

    // accumulate
    const merged = new Float32Array(buffer.length + input.length);
    merged.set(buffer);
    merged.set(input, buffer.length);
    buffer = merged;

    let outOffset = 0;

    // 🔥 ONLY full frames
    while (buffer.length >= FRAME && outOffset + FRAME <= output.length) {
      const frame = buffer.slice(0, FRAME);
      buffer = buffer.slice(FRAME);

      const cleaned = process(frame);
      output.set(cleaned, outOffset);

      outOffset += FRAME;
    }

    // 🔥 fill remainder to avoid crackle/silence gaps
    for (; outOffset < output.length; outOffset++) {
      output[outOffset] = 0;
    }
  };

  source.connect(analyser);
  analyser.connect(processor);
  processor.connect(ctx.destination); // loopback

  return (ctx2) => {
    analyser.getByteFrequencyData(new Uint8Array(analyser.frequencyBinCount));
  };
}

(async () => {
  const stream = await getAudioStream();
  await analyse(stream);
})();
</script>
