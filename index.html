<canvas id="sound"></canvas>

<script type="module">
import rnnoise from './rnnoise.js';

const $ = document.querySelector.bind(document);

function getAudioStream() {
  return navigator.mediaDevices.getUserMedia({ audio: true });
}

async function analyse(stream, hasDetector = false) {
  const context = new AudioContext();

  const analyser = context.createAnalyser();
  const source = context.createMediaStreamSource(stream);

  // IMPORTANT: must allow output channel
  const processor = context.createScriptProcessor(1024, 1, 1);

  let drawFn;

  if (hasDetector) {
    const {
      _rnnoise_create: createNoise,
      _rnnoise_process_frame: processNoise,
      _rnnoise_destroy: destroyNoise,
      _malloc: malloc,
      _free: free,
      HEAPF32
    } = await rnnoise();

    const SAMPLE_LENGTH = 480;
    const BUFFER_SIZE = SAMPLE_LENGTH * 4;

    const inPtr = malloc(BUFFER_SIZE);
    const outPtr = malloc(BUFFER_SIZE);

    const inIndex = inPtr / 4;
    const outIndex = outPtr / 4;

    const rn = createNoise();

    const processFrame = (frame) => {
      // RNNoise expects float32 [-1, 1]
      HEAPF32.set(frame, inIndex);
      processNoise(rn, outPtr, inPtr);

      return HEAPF32.slice(outIndex, outIndex + SAMPLE_LENGTH);
    };

    let residue = new Float32Array([]);

    processor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const output = e.outputBuffer.getChannelData(0);

      const combined = new Float32Array(residue.length + input.length);
      combined.set(residue);
      combined.set(input, residue.length);

      let i = 0;
      let outOffset = 0;

      while (i + SAMPLE_LENGTH <= combined.length && outOffset + SAMPLE_LENGTH <= output.length) {
        const frame = combined.slice(i, i + SAMPLE_LENGTH);
        const cleaned = processFrame(frame);

        output.set(cleaned, outOffset);

        i += SAMPLE_LENGTH;
        outOffset += SAMPLE_LENGTH;
      }

      residue = combined.slice(i);
    };

    window.addEventListener("beforeunload", () => {
      free(inPtr);
      free(outPtr);
      destroyNoise(rn);
    });

    source.connect(analyser);
    analyser.connect(processor);
    processor.connect(context.destination); // 🔥 THIS enables loopback

  } else {
    source.connect(analyser);
    analyser.connect(context.destination);
  }

  const bufferLen = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLen);

  drawFn = (ctx) => {
    analyser.getByteFrequencyData(dataArray);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, 400, 200);

    ctx.beginPath();
    ctx.strokeStyle = "#000";

    const slice = 400 / bufferLen;
    ctx.moveTo(0, 200);

    for (let i = 0; i < bufferLen; i++) {
      const y = 200 - (dataArray[i] / 255) * 180;
      ctx.lineTo(i * slice, y);
    }

    ctx.lineTo(400, 200);
    ctx.stroke();
  };

  return drawFn;
}

function setupCanvas(elem) {
  const ctx = elem.getContext("2d");
  elem.width = 400;
  elem.height = 200;
  elem.style.border = "4px solid black";
  return ctx;
}

const canvas = $("#sound");
const ctx = setupCanvas(canvas);

(async () => {
  const stream = await getAudioStream();
  const draw = await analyse(stream, true);

  function loop() {
    draw(ctx);
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
