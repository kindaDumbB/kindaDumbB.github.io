<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Stable RNNoise Mic</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column">

<button id="start">Start Mic</button>
<div id="status">Idle</div>

<script>
let ctx;
let wasm;
let memory;
let state;
let denoise;
let ready = false;

const FRAME_SIZE = 480;

// -----------------------------
// Load WASM safely
// -----------------------------
async function loadWasm() {
  const res = await fetch("rnnoise.wasm");

  if (!res.ok) throw new Error("WASM not found");

  const bytes = await res.arrayBuffer();

  const importObject = {
    env: {
      memory: new WebAssembly.Memory({ initial: 256, maximum: 512 }),
      emscripten_resize_heap: () => {}
    }
  };

  const { instance } = await WebAssembly.instantiate(bytes, importObject);

  wasm = instance;
  memory = importObject.env.memory;

  // Try multiple export names (RNNoise builds differ)
  denoise =
    wasm.exports.rnnoise_process_frame ||
    wasm.exports.process_frame ||
    wasm.exports.rnnoise_process ||
    wasm.exports._rnnoise_process_frame;

  const create =
    wasm.exports.rnnoise_create ||
    wasm.exports.create ||
    wasm.exports._rnnoise_create;

  if (!denoise) {
    console.warn("No RNNoise function found, using passthrough");
    ready = false;
    return;
  }

  if (create) {
    state = create();
  }

  ready = true;
  console.log("RNNoise ready");
}

// -----------------------------
// Frame-safe processing
// -----------------------------
function processFrame(input) {
  if (!ready || !denoise) {
    return input; // SAFE fallback (prevents silence/noise spikes)
  }

  const ptr = wasm.exports.malloc(FRAME_SIZE * 4);
  const buffer = new Float32Array(memory.buffer, ptr, FRAME_SIZE);

  for (let i = 0; i < FRAME_SIZE; i++) {
    buffer[i] = input[i] || 0;
  }

  // Safe call (different builds supported)
  try {
    if (state !== undefined) {
      denoise(state, ptr, ptr);
    } else {
      denoise(ptr, ptr);
    }
  } catch (e) {
    console.warn("RNNoise error, fallback active", e);
    wasm.exports.free(ptr);
    return input;
  }

  const output = new Float32Array(FRAME_SIZE);
  output.set(buffer);

  wasm.exports.free(ptr);

  return output;
}

// -----------------------------
// Start audio
// -----------------------------
document.getElementById("start").onclick = async () => {
  const status = document.getElementById("status");

  status.textContent = "Loading WASM...";

  await loadWasm();

  ctx = new AudioContext({ sampleRate: 48000 });

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: false
    }
  });

  const source = ctx.createMediaStreamSource(stream);

  const processor = ctx.createScriptProcessor(1024, 1, 1);

  let buffer = [];

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    const output = e.outputBuffer.getChannelData(0);

    for (let i = 0; i < input.length; i++) {
      buffer.push(input[i]);

      if (buffer.length === FRAME_SIZE) {
        const clean = processFrame(buffer);
        buffer = [];

        for (let j = 0; j < FRAME_SIZE; j++) {
          output[j] = clean[j] || 0;
        }
      } else {
        output[i] = input[i]; // ALWAYS pass-through
      }
    }
  };

  source.connect(processor);
  processor.connect(ctx.destination);

  status.textContent = ready
    ? "RNNoise ACTIVE"
    : "Fallback mode (no RNNoise export found)";
};
</script>

</body>
</html>
