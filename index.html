<canvas id="sound"></canvas>

<script type="module">
import rnnoise from './rnnoise.js';

const $ = document.querySelector.bind(document);

function getAudioStream() {
  return navigator.mediaDevices.getUserMedia({ audio: true });
}

async function analyse(stream, hasDetector = false) {
  const context = new AudioContext();

  const analyser = context.createAnalyser();
  const source = context.createMediaStreamSource(stream);

  const processor = context.createScriptProcessor(1024, 1, 1);

  let drawFn;

  if (hasDetector) {
    const {
      _rnnoise_create,
      _rnnoise_process_frame,
      _rnnoise_destroy,
      _malloc,
      _free,
      HEAPF32
    } = await rnnoise();

    const SAMPLE = 480;

    const inPtr = _malloc(SAMPLE * 4);
    const outPtr = _malloc(SAMPLE * 4);

    const inIndex = inPtr / 4;
    const outIndex = outPtr / 4;

    const rn = _rnnoise_create();

    // 🔥 proper streaming buffer
    let queue = new Float32Array(0);

    function push(a) {
      const merged = new Float32Array(queue.length + a.length);
      merged.set(queue);
      merged.set(a, queue.length);
      queue = merged;
    }

    function pop(n) {
      const out = queue.slice(0, n);
      queue = queue.slice(n);
      return out;
    }

    function processFrame(frame) {
      HEAPF32.set(frame, inIndex);
      _rnnoise_process_frame(rn, outPtr, inPtr);
      return HEAPF32.slice(outIndex, outIndex + SAMPLE);
    }

    processor.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const output = e.outputBuffer.getChannelData(0);

      push(input);

      let offset = 0;

      // 🔥 ALWAYS fill output fully
      while (offset < output.length) {

        if (queue.length >= SAMPLE) {
          const frame = pop(SAMPLE);
          const cleaned = processFrame(frame);

          output.set(cleaned, offset);
          offset += SAMPLE;

        } else {
          // 🔥 no underrun silence = avoid crackle
          const remaining = output.length - offset;
          output.set(queue.slice(0, remaining), offset);
          queue = queue.slice(remaining);
          offset += remaining;
        }
      }
    };

    window.addEventListener("beforeunload", () => {
      _free(inPtr);
      _free(outPtr);
      _rnnoise_destroy(rn);
    });

    source.connect(analyser);
    analyser.connect(processor);
    processor.connect(context.destination);

  } else {
    source.connect(analyser);
    analyser.connect(context.destination);
  }

  const bufferLen = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLen);

  drawFn = (ctx) => {
    analyser.getByteFrequencyData(dataArray);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, 400, 200);

    ctx.beginPath();
    ctx.strokeStyle = "#000";

    const step = 400 / bufferLen;
    ctx.moveTo(0, 200);

    for (let i = 0; i < bufferLen; i++) {
      const y = 200 - (dataArray[i] / 255) * 180;
      ctx.lineTo(i * step, y);
    }

    ctx.stroke();
  };

  return drawFn;
}

function setupCanvas(elem) {
  const ctx = elem.getContext("2d");
  elem.width = 400;
  elem.height = 200;
  elem.style.border = "4px solid black";
  return ctx;
}

const ctx = setupCanvas($("#sound"));

(async () => {
  const stream = await getAudioStream();
  const draw = await analyse(stream, true);

  function loop() {
    draw(ctx);
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
